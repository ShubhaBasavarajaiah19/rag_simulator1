<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shubha Basavarajaiah | Futuristic Resume</title>
  <style>
    :root {
      --bg: #050816;
      --panel: rgba(255, 255, 255, 0.08);
      --panel-strong: rgba(255, 255, 255, 0.14);
      --text: #f8fbff;
      --muted: #a8b3cf;
      --cyan: #00f5ff;
      --violet: #8b5cf6;
      --pink: #ff3df2;
      --green: #38f8a3;
      --line: rgba(255, 255, 255, 0.16);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 10%, rgba(0, 245, 255, 0.22), transparent 28%),
        radial-gradient(circle at 80% 0%, rgba(255, 61, 242, 0.18), transparent 30%),
        radial-gradient(circle at 70% 80%, rgba(139, 92, 246, 0.18), transparent 35%),
        var(--bg);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, black, transparent 85%);
    }

    .cursor-glow {
      position: fixed;
      width: 280px;
      height: 280px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(0,245,255,0.18), transparent 65%);
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
      transition: opacity 0.2s ease;
    }

    .resume {
      width: min(1180px, calc(100% - 32px));
      margin: 32px auto;
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 0.85fr 1.45fr;
      gap: 24px;
    }

    .card {
      background: linear-gradient(145deg, rgba(255,255,255,0.11), rgba(255,255,255,0.045));
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
      backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .sidebar {
      padding: 28px;
      position: sticky;
      top: 24px;
      height: fit-content;
    }

    .main {
      padding: 32px;
    }

    .avatar {
      width: 116px;
      height: 116px;
      border-radius: 32px;
      background:
        linear-gradient(135deg, rgba(0,245,255,0.9), rgba(139,92,246,0.9), rgba(255,61,242,0.8));
      display: grid;
      place-items: center;
      font-size: 2.6rem;
      font-weight: 900;
      letter-spacing: -0.08em;
      margin-bottom: 24px;
      box-shadow: 0 0 40px rgba(0,245,255,0.28);
    }

    h1 {
      font-size: clamp(2.7rem, 6vw, 5.4rem);
      line-height: 0.92;
      letter-spacing: -0.08em;
      margin-bottom: 16px;
    }

    .gradient-text {
      background: linear-gradient(90deg, var(--cyan), var(--violet), var(--pink));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .role {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
      max-width: 720px;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 24px;
    }

    .pill {
      border: 1px solid rgba(0,245,255,0.28);
      background: rgba(0,245,255,0.07);
      color: #dffcff;
      padding: 9px 12px;
      border-radius: 999px;
      font-size: 0.8rem;
      letter-spacing: 0.02em;
    }

    .section {
      margin-top: 34px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.86rem;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: var(--cyan);
      margin-bottom: 18px;
    }

    .section-title::before {
      content: "";
      width: 26px;
      height: 2px;
      background: linear-gradient(90deg, var(--cyan), transparent);
    }

    .contact-list, .skill-list {
      display: grid;
      gap: 12px;
      list-style: none;
    }

      color: var(--text);
      text-decoration: none;
